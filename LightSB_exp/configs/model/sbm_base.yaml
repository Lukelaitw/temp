# @package model
#
# Base config for SchrodingerBridgeMatching.
#
# The VAE sub-config is intentionally minimal here because the actual
# architecture is loaded from the VAE checkpoint (via vae_as_tokenizer).
# Dimensions that reference VAE internals use interpolation placeholders
# that will be resolved after the checkpoint is merged.

defaults:
  - vae_base   # pulls in vae_model / decoder_head / decoder_name

module:
  _target_: scldm.models.SchrodingerBridgeMatching

  # ---- frozen VAE tokenizer (loaded from checkpoint) ----
  vae_as_tokenizer:
    train: false
    load_from_checkpoint:
      ckpt_path: null      # TODO: path to directory containing VAE job sub-folders
      job_name: null       # TODO: name of the VAE training job
      epoch: null          # null → use last.ckpt

  # ---- ConditionedLightSBM ----
  sbm_model:
    _target_: scldm.lightsbm.ConditionedLightSBM
    # dim = n_inducing_points * n_embed_latent  (flat latent size)
    # These defaults match vae_base.yaml (16 * 16 = 256).
    # Override per dataset / VAE config.
    dim: 256
    n_potentials: 32
    # Multi-condition embeddings (1..K labels).
    condition_label_order: [gene, cell_line]
    condition_vocab_sizes:
      gene: 2023
      cell_line: 4
    cond_embed_dim: 64
    cond_hidden_dim: 128       # null for a single linear layer
    epsilon: 1.0
    sampling_batch_size: 64
    S_diagonal_init: 0.1

  # ---- SBM optimizer ----
  sbm_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1e-3
    weight_decay: 0.0
    betas: [0.9, 0.95]

  # ---- LR scheduler ----
  sbm_scheduler:
    _target_: scldm._utils.wsd_schedule
    num_training_steps: ${training.trainer.max_steps}
    final_lr_factor: 0.1
    num_warmup_steps: null
    init_div_factor: 100
    fract_decay: 1.0
    decay_type: cosine

  # ---- Bridge matching hyperparameters ----
  safe_t: 0.01
  epsilon: 1.0
  euler_maruyama_steps: 100
  calculate_grad_norms: false
  gears_eval_freq: 50
  gears_eval_sample_size: 512
  gears_top_k_de: 20
  ctrl_mean_path: null

batch_size: 128
test_batch_size: 128
