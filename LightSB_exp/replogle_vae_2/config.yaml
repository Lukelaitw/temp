      cell_line: 1.0
      gene: 1.0
    mu_size_factor: /projects/p32572/Luke/_artifacts/resubmission/replogle_log_size_factor_munew.pkl
    sd_size_factor: /projects/p32572/Luke/_artifacts/resubmission/replogle_log_size_factor_sdnew.pkl
    condition_strategy: joint
    metadata_genes: null
    metadata_json: /gpfs/projects/p32572/Luke/metadata/replogle_train.json
