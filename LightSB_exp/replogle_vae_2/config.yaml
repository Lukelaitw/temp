      sample_genes: expressed
      mu_size_factor: ${paths.base_release_path}/resubmission/dentate_gyrus_log_size_factor_mu.pkl
      sd_size_factor: ${paths.base_release_path}/resubmission/dentate_gyrus_log_size_factor_sd.pkl
      adata_attr: X
      adata_key: null
      condition_strategy: mutually_exclusive
      metadata_genes: null
      metadata_json: ${paths.base_repo_path}/metadata/dentategyrus_train.json
    hlca:
      n_genes: 27997
